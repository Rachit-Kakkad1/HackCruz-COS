version: "3.9"

services:
  # ─── PostgreSQL with pgvector ──────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cos_user
      POSTGRES_PASSWORD: cos_secret
      POSTGRES_DB: cos_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cos_user -d cos_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Redis for background task queuing ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── FastAPI Application ───────────────────────────────────────────────
  api:
    build: .
    container_name: cos-api
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://cos_user:cos_secret@postgres:5432/cos_db
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EMBEDDING_MODEL: all-MiniLM-L6-v2
    volumes:
      - .:/app
      - model_cache:/root/.cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Background Worker (consolidation, embeddings) ─────────────────────
  worker:
    build: .
    container_name: cos-worker
    restart: unless-stopped
    command: python -m app.workers.background_tasks
    environment:
      DATABASE_URL: postgresql+asyncpg://cos_user:cos_secret@postgres:5432/cos_db
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EMBEDDING_MODEL: all-MiniLM-L6-v2
    volumes:
      - .:/app
      - model_cache:/root/.cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Event Worker (Redis queue consumer — real-time AI pipeline) ────────
  event_worker:
    build: .
    container_name: cos-event-worker
    restart: unless-stopped
    command: python -m app.workers.event_worker
    environment:
      DATABASE_URL: postgresql+asyncpg://cos_user:cos_secret@postgres:5432/cos_db
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EMBEDDING_MODEL: all-MiniLM-L6-v2
    volumes:
      - .:/app
      - model_cache:/root/.cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  model_cache:
