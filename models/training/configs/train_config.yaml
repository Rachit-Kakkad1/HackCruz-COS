# ─────────────────────────────────────────────
#  FLAN-T5 Small  –  Summarization Fine-Tune
#  Config: configs/train_config.yaml
# ─────────────────────────────────────────────

model:
  name: "google/flan-t5-small"        # HuggingFace model ID
  max_input_length: 512               # tokens – source text
  max_target_length: 128              # tokens – summary output

data:
  dataset_name: "cnn_dailymail"       # HF dataset; swap with your own
  dataset_config: "3.0.0"
  train_split: "train"
  val_split: "validation"
  test_split: "test"
  text_column: "article"              # column with raw text
  summary_column: "highlights"        # column with reference summary
  num_train_samples: null             # null = use all; set int to limit
  num_val_samples: 1000

training:
  output_dir: "outputs/checkpoints"
  num_epochs: 3
  train_batch_size: 8
  eval_batch_size: 16
  learning_rate: 3e-4
  weight_decay: 0.01
  warmup_steps: 500
  gradient_accumulation_steps: 2      # effective batch = 8 × 2 = 16
  fp16: false                         # set true if GPU supports it
  bf16: false                         # set true for A100 / modern GPUs
  save_steps: 500
  eval_steps: 500
  logging_steps: 100
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "rouge2"
  greater_is_better: true
  seed: 42

generation:
  num_beams: 4
  early_stopping: true
  no_repeat_ngram_size: 3

logging:
  report_to: "tensorboard"            # tensorboard | wandb | none
  log_dir: "outputs/logs"
  run_name: "flan-t5-small-summarizer"
